<!DOCTYPE html>
<html lang="eng">
    <head>
        <title>
            get in touch
        </title>
        <style>
            body{
                background-color:whitesmoke;
                align-items: center;
                display: flex;
                justify-content: center;
                min-height: 100vh;
                
            }
            .container{
               background-color: white;
               padding: 20px;
               border-radius:30px;
               box-shadow: 0 0 10px rgba(0,0,0,0.1);
               width: 400px;
               height:500px;
            }
            input{
                width: 100%;
                padding: 10px;
                margin-bottom: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
            }
        .textarea{
          
                width:100%;
                height:200px;
                border:2px solid #ccc;
                border-radius: 5px;
            }
            button{
                background-color: black;
                color: white;
                font-size: large;
                font-family:'Times New Roman', Times, serif;
                text-align: center;
                
            }
        </style>
        <body>
            <div class="container">
                <h3>GET IN TOUCH WITH US</h3>
                <form>
                    <label>NAME</label>
                    <input type="text" placeholder="full name">
                    <label>EMAIL</label>
                    <input type="email" placeholder="email address">                   
                    <label>MESSAGE</label>
                   <textarea class="textarea" placeholder="your message here"></textarea>
                   <button type="submit">send message</button>
                
                    </label>
                </form>
            </div>
        </body>
    </head>
</html>
